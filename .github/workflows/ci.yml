name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dev tools
        # Only the lightweight dev tools. The runtime deps (mem0/chromadb/torch)
        # are intentionally NOT installed: the pure unit tests don't need them and
        # the integration tests skip themselves when they're absent. This keeps CI
        # fast and stable while still guarding the retrieval/store/viewer logic.
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check server tests

      - name: Test (pytest)
        run: pytest
